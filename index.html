    <style>
        /* ПАЛИТРА - ГЛУБОКИЙ ТЕМНЫЙ */
        :root {
            --bg: #020202;
            --cyan: #00cbd6; 
            --cyan-dim: rgba(0, 203, 214, 0.15);
            --border: rgba(255, 255, 255, 0.03);
            --glass: rgba(12, 12, 12, 0.98);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #080f11 0%, #020202 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .wrapper {
            width: 100%;
            max-width: 1100px; /* Увеличено для ряда из 3-х колонок */
            text-align: center;
        }

        /* ЛОГОТИП */
        header { margin-bottom: 50px; }
        .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--cyan-dim);
        }
        .logo span { color: var(--cyan); }
        .tag { font-size: 0.7rem; color: #444; letter-spacing: 6px; margin-top: 10px; }

        /* ГЛАВНЫЙ ЛАУНЧЕР */
        .hub-block {
            background: var(--glass);
            border: 1px solid var(--cyan-dim);
            padding: 50px;
            margin-bottom: 20px;
            position: relative;
        }

        .status {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            border: 1px solid var(--cyan-dim);
            background: var(--bg);
            color: var(--cyan);
            padding: 2px 15px;
            font-size: 0.65rem;
            letter-spacing: 2px;
        }

        h2 { font-size: 1.8rem; margin-bottom: 15px; letter-spacing: 4px; }
        p { color: #777; font-size: 0.9rem; margin-bottom: 30px; line-height: 1.6; max-width: 600px; margin: 0 auto 30px; }

        /* СЕТКА ПРОГРАММ - ВСЕ В РЯД */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Ровно 3 колонки */
            gap: 15px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 35px 20px;
            transition: 0.3s ease;
        }

        .card:hover {
            border-color: var(--cyan-dim);
            background: rgba(255, 255, 255, 0.01);
            transform: translateY(-5px);
        }

        .card h3 { font-size: 0.9rem; margin-bottom: 20px; letter-spacing: 2px; color: #bbb; }

        /* КНОПКИ */
        .btn {
            text-decoration: none;
            color: var(--cyan);
            border: 1px solid var(--cyan-dim);
            padding: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.2s;
            display: block;
            width: 100%;
        }

        .main-btn {
            display: inline-block;
            width: auto;
            min-width: 280px;
            padding: 18px 40px;
            background: rgba(0, 203, 214, 0.03);
        }

        .btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 15px var(--cyan-dim);
        }

        /* КОНТАКТЫ */
        .contact {
            margin-top: 60px;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 4px;
        }
        .contact span { color: var(--cyan); font-weight: bold; }

        /* АДАПТИВНОСТЬ ДЛЯ МОБИЛОК */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; } /* На телефонах всё же в столбик для удобства */
            .logo { font-size: 2rem; letter-spacing: 10px; }
        }
    </style>
</head>
